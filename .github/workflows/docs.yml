name: docs

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Cancel an in-flight deploy if a newer commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build docs site
        # SITE_BASE is read by vite.config.ts so assets resolve under the
        # gh-pages subpath (https://ashutosh-b-b.github.io/agentflow/ and
        # https://ashutoshbb.me/agentflow/).
        env:
          SITE_BASE: /agentflow/
        run: npm run build:docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
